# compose.search.yml
# ---------------------------------------------------------------------------
# Override file that adds Web search capability to Hermes:
#
#   - SearXNG : self-hosted metasearch engine (Google/Bing/DuckDuckGo aggregation)
#
# Usage:
#   ./scripts/setup.sh --with-search
#   docker compose -f docker-compose.yml -f compose.search.yml up -d --build
#
# Combine freely with Ollama-in-Docker mode:
#   docker compose -f docker-compose.yml -f compose.ollama.yml -f compose.search.yml up -d --build
#
# Resource note:
#   SearXNG is lightweight (~200 MB RAM steady-state). No Chromium download.
# ---------------------------------------------------------------------------

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-please-change-via-setup-sh}
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=4
    networks:
      - hermes-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  hermes-agent:
    depends_on:
      - searxng

  hermes-webui:
    depends_on:
      - hermes-agent
      - searxng
