services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    command: gateway run
    restart: unless-stopped
    ports:
      - "127.0.0.1:8642:8642"
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      - HERMES_UID=${HOST_UID:-1000}
      - HERMES_GID=${HOST_GID:-1000}
      # NOTE: SEARXNG_URL is read by Hermes from ~/.hermes/.env (not from this
      # process env). The line below is documentation/fallback only.
      - SEARXNG_URL=http://searxng:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.hermes:/home/hermes/.hermes
      - hermes-agent-src:/opt/hermes
    networks:
      - hermes-net
    depends_on:
      - searxng

  hermes-webui:
    build: ./hermes-webui
    container_name: hermes-webui
    restart: unless-stopped
    depends_on:
      - hermes-agent
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:8787:8787"
    tmpfs:
      - /tmp:rw,nosuid,nodev,mode=1777
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.hermes:/home/hermeswebui/.hermes
      - hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent
      - ${HOME}/workspace:/workspace
    networks:
      - hermes-net

  hermes-hudui:
    build:
      context: ./hermes-hudui
      dockerfile: Dockerfile
    container_name: hermes-hudui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - PYTHONUNBUFFERED=1
      - HERMES_HOME=/root/.hermes
    volumes:
      - ${HOME}/.hermes:/root/.hermes
    networks:
      - hermes-net

  # ---------------------------------------------------------------------------
  # SearXNG — meta-search backend that powers Hermes' built-in `web_search`
  # tool. Runs locally; no external API key required.
  #
  # Wired to Hermes via:
  #   - ~/.hermes/config.yaml   web.search_backend: "searxng"
  #   - ~/.hermes/.env          SEARXNG_URL=http://searxng:8080
  # `scripts/setup.sh` sets both for you.
  # ---------------------------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:?set SEARXNG_SECRET_KEY in .env (run scripts/setup.sh)}
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=4
    networks:
      - hermes-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  hermes-net:
    driver: bridge

volumes:
  hermes-agent-src:
