# compose.search.yml
# ---------------------------------------------------------------------------
# Override file that adds Web search capability to Hermes:
#
#   - SearXNG  : self-hosted metasearch engine (Google/Bing/DuckDuckGo aggregation)
#   - Crawl4AI : LLM-friendly web page crawler/extractor (Playwright-based)
#
# Usage:
#   ./scripts/setup.sh --with-search
#   docker compose -f docker-compose.yml -f compose.search.yml up -d --build
#
# Combine freely with Ollama-in-Docker mode:
#   docker compose -f docker-compose.yml -f compose.ollama.yml -f compose.search.yml up -d --build
#
# Resource note:
#   Crawl4AI ships with Chromium and Playwright. First start downloads
#   ~1 GB of browser binaries. Steady-state RAM ~500 MB.
# ---------------------------------------------------------------------------

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-please-change-via-setup-sh}
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=4
    networks:
      - hermes-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: unless-stopped
    ports:
      - "127.0.0.1:11235:11235"
    shm_size: 1gb            # Playwright/Chromium needs shared memory
    networks:
      - hermes-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:11235/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s      # First boot pulls Chromium

  hermes-agent:
    depends_on:
      - searxng
      - crawl4ai

  hermes-webui:
    depends_on:
      - hermes-agent
      - searxng
      - crawl4ai
